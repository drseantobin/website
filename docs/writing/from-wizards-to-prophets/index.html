:null,&quot;title&quot;:null,&quot;type&quot;:&quot;image/png&quot;,&quot;href&quot;:null,&quot;belowTheFold&quot;:false,&quot;topImage&quot;:true,&quot;internalRedirect&quot;:&quot;https://drseantobin.substack.com/i/172059899?img=https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F66c08445-50a5-43e3-aa41-e233b314ec92_1029x583.png&quot;,&quot;isProcessing&quot;:false,&quot;align&quot;:null,&quot;offset&quot;:false}" class="sizing-normal" alt="" srcset="https://substackcdn.com/image/fetch/$s_!ux8E!,w_424,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F66c08445-50a5-43e3-aa41-e233b314ec92_1029x583.png 424w, https://substackcdn.com/image/fetch/$s_!ux8E!,w_848,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F66c08445-50a5-43e3-aa41-e233b314ec92_1029x583.png 848w, https://substackcdn.com/image/fetch/$s_!ux8E!,w_1272,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F66c08445-50a5-43e3-aa41-e233b314ec92_1029x583.png 1272w, https://substackcdn.com/image/fetch/$s_!ux8E!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F66c08445-50a5-43e3-aa41-e233b314ec92_1029x583.png 1456w" sizes="100vw" fetchpriority="high"></picture><div></div><p>Dr. Greg Bottaro and I were deep in conversation on his <em><a href="https://youtu.be/262rwl1JyHg?si=C0bo2X6zU7Ya-Py3">Being Human Podcast</a></em> when we found ourselves laughing about our sons—his 12-year-old and my 10-year-old—and their love of fantasy literature. Both avid readers who've devoured Tolkien and Lewis, they've been asking us questions about magic in the stories they read.</p><p>The conversation took an interesting turn when Greg mentioned that a male colleague of his plays <em>Dungeons &amp; Dragons</em>, but shared the concern that some Catholics have about potentially "opening demonic doors" through fantasy role-playing. As two Catholic fathers and psychologists, we realized we'd stumbled into an important conversation for our time: How do we discern between harmless fantasy and something spiritually problematic in a culture where the lines are increasingly blurred?</p></div>
