name: sync-and-build
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 11 * * *'   # daily ~07:17 ET, re-sync Substack
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: site-build
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync Substack
        run: python3 scripts/sync_substack.py
      - name: Build site
        run: python3 scripts/build.py
      - name: Commit changes
        run: |
          git config user.name "site-bot"
          git config user.email "actions@github.com"
          git add content docs
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Auto-sync Substack + rebuild [skip ci]"
            git push
          fi
