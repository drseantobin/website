71M17.6179 8.67647L13.6473 6.91176M17.4995 12.1841C16.5378 15.2609 13.5967 17.5 10.1178 17.5C6.86118 17.5 4.07589 15.5379 2.94432 12.7632L2.41165 11.3235M2.41165 11.3235L1.5293 15.7353M2.41165 11.3235L6.38224 13.0882"></path></g></svg></button><button tabindex="0" type="button" class="pencraft pc-reset pencraft icon-container view-image"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize2 lucide-maximize-2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" x2="14" y1="3" y2="10"></line><line x1="3" x2="10" y1="21" y2="14"></line></svg></button></div><p>Francis Chan once stood on a stage holding a long white rope that stretched across the floor and disappeared into the distance. At the very end, a small section was wrapped in red tape.</p><blockquote><p>“This red part,” he said, “represents your life on earth. You’ve got a few short years here—and then comes eternity.”</p><p>He ran his fingers along that tiny red tip.<br>“This is where you get your house. This is where you retire. This is where you travel. You save, you plan, you hustle—for <em>this.</em>”<br>Then he lifted the rest of the rope stretching far beyond the stage.</p><blockquote><p>“This goes on forever,” he said. “And most people live for <em>this</em>—the red part.”</p></div>
